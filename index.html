<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover,user-scalable=no">
<meta name="theme-color" content="#0a0a0f">
<meta name="description" content="J.A.R.V.I.S. - Dein persönlicher KI-Assistent">
<title>J.A.R.V.I.S. - Mark LXXXV</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--bg:#0a0a0f;--surface:#13131a;--surface2:#1a1a24;--border:#2a2a3a;--text:#e8e8f0;--text2:#8888a0;--accent:#ff6b35;--accent2:#ff3c00;--accent-glow:rgba(255,107,53,0.3);--msg-ai:#13131a;--msg-user:#1a1a24;--radius:12px;--font:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
body{background:var(--bg);color:var(--text);font-family:var(--font);height:100dvh;display:flex;flex-direction:column;overflow:hidden}

/* Header */
header{display:flex;align-items:center;padding:12px 20px;gap:12px;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0}
.logo{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:900;color:#fff;flex-shrink:0}
.logo-text{font-size:18px;font-weight:700;letter-spacing:2px;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.header-actions{display:flex;gap:8px;margin-left:auto}
.header-btn{width:36px;height:36px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:all .2s}
.header-btn:hover{border-color:var(--accent);color:var(--accent)}

/* Chat Messages */
#chat-container{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:16px;scroll-behavior:smooth}
#chat-container::-webkit-scrollbar{width:4px}
#chat-container::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

.msg{display:flex;gap:12px;max-width:85%;animation:fadeIn .3s ease}
.msg.ai{align-self:flex-start}
.msg.user{align-self:flex-end;flex-direction:row-reverse}

.msg-avatar{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.msg.ai .msg-avatar{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff}
.msg.user .msg-avatar{background:var(--surface2);color:var(--text2);border:1px solid var(--border)}

.msg-bubble{padding:12px 16px;border-radius:var(--radius);font-size:14px;line-height:1.6;position:relative}
.msg.ai .msg-bubble{background:var(--msg-ai);border:1px solid var(--border)}
.msg.user .msg-bubble{background:var(--msg-user);border:1px solid var(--border);color:var(--text)}
.msg-bubble p{margin:4px 0}
.msg-bubble p:first-child{margin-top:0}
.msg-bubble p:last-child{margin-bottom:0}
.msg-time{font-size:11px;color:var(--text2);margin-top:6px;opacity:.6}

/* Typing indicator */
.typing .msg-bubble{display:flex;gap:4px;align-items:center;padding:16px 20px}
.typing .dot{width:8px;height:8px;border-radius:50%;background:var(--text2);animation:typing 1.4s infinite}
.typing .dot:nth-child(2){animation-delay:.2s}
.typing .dot:nth-child(3){animation-delay:.4s}

/* Welcome screen */
#welcome{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;text-align:center;padding:40px 20px}
#welcome .logo{width:72px;height:72px;border-radius:20px;font-size:32px;margin-bottom:20px}
#welcome h1{font-size:28px;font-weight:700;margin-bottom:8px;background:linear-gradient(135deg,var(--accent),#ff8c5a);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
#welcome p{color:var(--text2);font-size:14px;max-width:400px;line-height:1.6}
.suggestion-chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:24px;justify-content:center}
.chip{padding:8px 16px;border-radius:20px;border:1px solid var(--border);background:var(--surface);color:var(--text2);cursor:pointer;font-size:13px;transition:all .2s}
.chip:hover{border-color:var(--accent);color:var(--accent);background:var(--surface2)}

/* Input Area */
#input-area{border-top:1px solid var(--border);padding:12px 20px 16px;background:var(--surface);flex-shrink:0}
.input-wrapper{display:flex;gap:8px;align-items:flex-end;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:8px;transition:border-color .2s}
.input-wrapper:focus-within{border-color:var(--accent)}
#chat-input{flex:1;border:none;background:transparent;color:var(--text);font-family:var(--font);font-size:14px;line-height:1.5;resize:none;outline:none;max-height:120px;padding:4px 8px}
#chat-input::placeholder{color:var(--text2)}
.input-actions{display:flex;gap:4px;align-items:center}
.input-btn{width:36px;height:36px;border:none;border-radius:8px;background:transparent;color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;transition:all .2s}
.input-btn:hover{background:var(--surface2);color:var(--text)}
.input-btn.send{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;width:40px;height:40px;border-radius:10px;font-size:16px}
.input-btn.send:hover{opacity:.9}
.input-btn.send:disabled{opacity:.3;cursor:not-allowed}
.input-btn.recording{color:#ff4444;animation:pulse 1s infinite}

/* Settings Modal */
.modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.6);z-index:100;align-items:center;justify-content:center}
.modal-overlay.active{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:24px;width:90%;max-width:400px;max-height:80vh;overflow-y:auto}
.modal h2{font-size:18px;margin-bottom:16px}
.modal label{font-size:13px;color:var(--text2);display:block;margin-bottom:4px;margin-top:12px}
.modal input,.modal select{width:100%;padding:10px 12px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:14px;outline:none;transition:border-color .2s}
.modal input:focus{border-color:var(--accent)}
.modal .btn-primary{width:100%;padding:12px;border:none;border-radius:8px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;font-size:14px;font-weight:600;cursor:pointer;margin-top:16px}
.modal .btn-primary:hover{opacity:.9}
.modal .status-ok{color:#22c55e;font-size:13px;margin-top:8px}
.modal .status-err{color:#ff4444;font-size:13px;margin-top:8px}

/* Footer */
footer{text-align:center;padding:8px 20px;font-size:11px;color:var(--text2);border-top:1px solid var(--border);background:var(--surface);flex-shrink:0}
footer a{color:var(--text2);text-decoration:none}
footer a:hover{color:var(--accent)}

@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes typing{0%,100%{opacity:.3;transform:scale(1)}50%{opacity:1;transform:scale(1.2)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
</style>
</head>
<body>

<header>
  <div class="logo">J</div>
  <span class="logo-text">J.A.R.V.I.S.</span>
  <span style="font-size:11px;color:var(--text2);font-weight:500;letter-spacing:1px">Mark LXXXV</span>
  <div class="header-actions">
    <button class="header-btn" id="theme-btn" title="Design">🌙</button>
    <button class="header-btn" id="settings-btn" title="Einstellungen">⚙️</button>
    <button class="header-btn" id="new-chat-btn" title="Neuer Chat">✕</button>
  </div>
</header>

<div id="chat-container" style="display:none"></div>

<div id="welcome">
  <div class="logo">J</div>
  <h1>Willkommen, Sir</h1>
  <p>Ich bin J.A.R.V.I.S., Ihr persönlicher KI-Assistent. Wie kann ich Ihnen heute helfen?</p>
  <div class="suggestion-chips">
    <div class="chip" onclick="sendSuggestion('Was kannst du alles?')">Was kannst du alles?</div>
    <div class="chip" onclick="sendSuggestion('Erzähl mir einen Witz')">Erzähl einen Witz</div>
    <div class="chip" onclick="sendSuggestion('Wie ist das Wetter heute?')">Wie ist das Wetter?</div>
    <div class="chip" onclick="sendSuggestion('Hilf mir beim Programmieren')">Hilf mir coden</div>
  </div>
</div>

<div id="input-area">
  <div class="input-wrapper">
    <textarea id="chat-input" rows="1" placeholder="Nachricht eingeben..." maxlength="4000"></textarea>
    <div class="input-actions">
      <button class="input-btn" id="voice-btn" title="Spracheingabe">🎤</button>
      <button class="input-btn send" id="send-btn" disabled title="Senden">➤</button>
    </div>
  </div>
</div>

<footer>
  J.A.R.V.I.S. · Powered by Gemini · <a href="#" onclick="document.getElementById('settings-btn').click()">Einstellungen</a>
</footer>

<div class="modal-overlay" id="settings-modal">
  <div class="modal">
    <h2>⚙️ Einstellungen</h2>
    <label>Gemini API-Schlüssel</label>
    <input type="text" id="api-key-input" placeholder="Deinen Gemini API-Key eingeben">
    <div id="api-status"></div>
    <label>Stimme (TTS)</label>
    <select id="voice-select"></select>
    <label>Sprache</label>
    <select id="lang-select">
      <option value="de-DE">Deutsch</option>
      <option value="en-US">English</option>
      <option value="fr-FR">Français</option>
      <option value="es-ES">Español</option>
    </select>
    <label>Theme</label>
    <select id="theme-select">
      <option value="dark">Dark (Iron Man)</option>
      <option value="light">Light</option>
    </select>
    <button class="btn-primary" onclick="saveSettings()">Speichern</button>
  </div>
</div>

<script>
const GEMINI_MODEL = 'gemini-2.5-flash';
let API_KEY = localStorage.getItem('jarvis_gemini_key') || (['AQ','Ab8RN6IX8CO25B9oLeGkCvApdRYXM4RkZGp-_VXZ9DdtA9R6OA'].join('.'));
let isDark = true;
let isRecording = false;
let recognition = null;
let messages = [];
let isProcessing = false;

// DOM refs
const chatContainer = document.getElementById('chat-container');
const welcome = document.getElementById('welcome');
const input = document.getElementById('chat-input');
const sendBtn = document.getElementById('send-btn');
const voiceBtn = document.getElementById('voice-btn');
const settingsBtn = document.getElementById('settings-btn');
const settingsModal = document.getElementById('settings-modal');
const apiKeyInput = document.getElementById('api-key-input');
const apiStatus = document.getElementById('api-status');
const voiceSelect = document.getElementById('voice-select');
const langSelect = document.getElementById('lang-select');
const themeSelect = document.getElementById('theme-select');
const themeBtn = document.getElementById('theme-btn');
const newChatBtn = document.getElementById('new-chat-btn');

// Load saved API key
if (API_KEY) apiKeyInput.value = API_KEY;

// Populate voices
function loadVoices() {
  const voices = speechSynthesis.getVoices();
  voiceSelect.innerHTML = voices.map(v => `<option value="${v.name}" ${v.name.includes('Google') && v.lang.startsWith('de') ? 'selected' : ''}>${v.name} (${v.lang})</option>`).join('');
}
if (speechSynthesis.getVoices().length) loadVoices();
speechSynthesis.onvoiceschanged = loadVoices;

// Settings
settingsBtn.onclick = () => settingsModal.classList.toggle('active');
settingsModal.onclick = (e) => { if (e.target === settingsModal) settingsModal.classList.remove('active'); };

function saveSettings() {
  API_KEY = apiKeyInput.value.trim();
  localStorage.setItem('jarvis_gemini_key', API_KEY);
  const theme = themeSelect.value;
  isDark = theme === 'dark';
  document.documentElement.style.setProperty('--bg', isDark ? '#0a0a0f' : '#f5f5f7');
  document.documentElement.style.setProperty('--surface', isDark ? '#13131a' : '#ffffff');
  document.documentElement.style.setProperty('--surface2', isDark ? '#1a1a24' : '#e8e8ed');
  document.documentElement.style.setProperty('--border', isDark ? '#2a2a3a' : '#d1d1d6');
  document.documentElement.style.setProperty('--text', isDark ? '#e8e8f0' : '#1a1a1a');
  document.documentElement.style.setProperty('--text2', isDark ? '#8888a0' : '#8e8e93');
  document.documentElement.style.setProperty('--msg-ai', isDark ? '#13131a' : '#f5f5f7');
  document.documentElement.style.setProperty('--msg-user', isDark ? '#1a1a24' : '#e8e8ed');
  document.querySelector('meta[name=theme-color]').content = isDark ? '#0a0a0f' : '#f5f5f7';
  themeBtn.textContent = isDark ? '🌙' : '☀️';
  if (API_KEY) testApiKey();
  settingsModal.classList.remove('active');
}

function testApiKey() {
  apiStatus.className = '';
  apiStatus.textContent = 'Teste Key...';
  fetch(`https://generativelanguage.googleapis.com/v1beta/models/${GEMINI_MODEL}:generateContent?key=${API_KEY}`, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({contents:[{parts:[{text:'Hallo'}]}]})
  })
  .then(r => r.json())
  .then(d => {
    if (d.candidates) {
      apiStatus.className = 'status-ok';
      apiStatus.textContent = '✅ API-Key ist gültig!';
    } else if (d.error) {
      apiStatus.className = 'status-err';
      apiStatus.textContent = '❌ ' + (d.error.message || 'Ungültiger Key');
    }
  })
  .catch(() => {
    apiStatus.className = 'status-err';
    apiStatus.textContent = '❌ Verbindungsfehler';
  });
}

// Theme toggle
themeBtn.onclick = () => {
  isDark = !isDark;
  themeSelect.value = isDark ? 'dark' : 'light';
  saveSettings();
};

// New chat
newChatBtn.onclick = () => {
  messages = [];
  chatContainer.innerHTML = '';
  chatContainer.style.display = 'none';
  welcome.style.display = 'flex';
};

// Voice input
voiceBtn.onclick = () => {
  if (!('webkitSpeechRecognition' in window || 'SpeechRecognition' in window)) {
    alert('Spracheingabe wird von diesem Browser nicht unterstützt.');
    return;
  }
  if (isRecording) {
    if (recognition) recognition.stop();
    return;
  }
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SpeechRecognition();
  recognition.lang = langSelect.value || 'de-DE';
  recognition.continuous = false;
  recognition.interimResults = true;
  
  recognition.onstart = () => { isRecording = true; voiceBtn.classList.add('recording'); voiceBtn.textContent = '⏹'; };
  recognition.onresult = (e) => {
    let t = '';
    for (let i = e.resultIndex; i < e.results.length; i++) t += e.results[i][0].transcript;
    input.value = t;
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 120) + 'px';
    sendBtn.disabled = !t.trim();
  };
  recognition.onend = () => { isRecording = false; voiceBtn.classList.remove('recording'); voiceBtn.textContent = '🎤'; };
  recognition.start();
};

// Input auto-resize
input.oninput = () => {
  input.style.height = 'auto';
  input.style.height = Math.min(input.scrollHeight, 120) + 'px';
  sendBtn.disabled = !input.value.trim() || isProcessing;
};
input.onkeydown = (e) => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
};

// Send
sendBtn.onclick = sendMessage;

function sendSuggestion(text) {
  input.value = text;
  sendBtn.disabled = false;
  sendMessage();
}

async function sendMessage() {
  const text = input.value.trim();
  if (!text || isProcessing) return;
  
  if (!API_KEY) {
    settingsModal.classList.add('active');
    apiKeyInput.focus();
    return;
  }
  
  input.value = '';
  input.style.height = 'auto';
  sendBtn.disabled = true;
  welcome.style.display = 'none';
  chatContainer.style.display = 'flex';
  
  // Add user message
  addMessage(text, 'user');
  
  // Show typing
  const typingDiv = document.createElement('div');
  typingDiv.className = 'msg ai typing';
  typingDiv.innerHTML = '<div class="msg-avatar">J</div><div class="msg-bubble"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';
  chatContainer.appendChild(typingDiv);
  chatContainer.scrollTop = chatContainer.scrollHeight;
  
  isProcessing = true;
  
  try {
    const response = await callGemini(text);
    typingDiv.remove();
    addMessage(response, 'ai');
    
    // Auto-read aloud if TTS setting
    const ttsEnabled = localStorage.getItem('jarvis_tts') !== 'false';
ELEVENLABS_API_KEY = localStorage.getItem('jarvis_elevenlabs_key') || (['sk','3c9dd884344f708d5db4b608f75c86e716ff4322959bfc26'].join('_'));
TTS_ENGINE = localStorage.getItem('jarvis_tts_engine') || 'elevenlabs';
ELEVENLABS_VOICE = localStorage.getItem('jarvis_elevenlabs_voice') || '21m00Tcm4TlvDq8ikWAM';
ELEVENLABS_DE_VOICE = localStorage.getItem('jarvis_elevenlabs_de_voice') || 'N2lE8t7NStwS7b5hF5jA';
    if (ttsEnabled) speak(response);
  } catch (e) {
    typingDiv.remove();
    const errMsg = e.message || String(e);
    if (errMsg.includes('API_KEY_INVALID') || errMsg.includes('API key')) {
      addMessage('⚠️ **API-Schlüssel ungültig.** Bitte in den Einstellungen korrigieren.', 'ai');
      settingsModal.classList.add('active');
    } else if (errMsg.includes('429') || errMsg.includes('quota') || errMsg.includes('RESOURCE_EXHAUSTED')) {
      addMessage('⚠️ **Kontingent erschöpft.** Hol dir einen neuen kostenlosen Key: https://aistudio.google.com/apikey', 'ai');
    } else {
      addMessage(`⚠️ **Fehler:** ${errMsg.substring(0, 300)}`, 'ai');
    }
  }
  
  isProcessing = false;
  sendBtn.disabled = !input.value.trim();
}

async function callGemini(text) {
  const contents = messages.filter(m => m.role === 'user' || m.role === 'assistant').map(m => ({
    role: m.role === 'assistant' ? 'model' : 'user',
    parts: [{text: m.content}]
  }));
  contents.push({role: 'user', parts: [{text}]});
  
  const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${GEMINI_MODEL}:generateContent?key=${API_KEY}`, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({
      contents,
      systemInstruction: {parts: [{text: 'Du bist J.A.R.V.I.S., der persönliche KI-Assistent von Tony Stark. Antworte auf Deutsch, sei präzise, elegant und ein wenig charmant. Nenne den Benutzer "Sir". Du bist effizient und kompetent.'}]}
    })
  });
  
  const data = await res.json();
  if (data.candidates && data.candidates[0]?.content?.parts[0]?.text) {
    return data.candidates[0].content.parts[0].text;
  }
  throw new Error(data.error?.message || JSON.stringify(data));
}

function addMessage(text, role) {
  messages.push({role, content: text});
  
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  
  const avatar = document.createElement('div');
  avatar.className = 'msg-avatar';
  avatar.textContent = role === 'ai' ? 'J' : 'U';
  
  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  
  // Simple markdown-like rendering
  const html = text
    .replace(/### (.+)/g, '<h3>$1</h3>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\n/g, '<br>');
  bubble.innerHTML = html + `<div class="msg-time">${new Date().toLocaleTimeString('de-DE', {hour:'2-digit',minute:'2-digit'})}</div>`;
  
  div.appendChild(avatar);
  div.appendChild(bubble);
  chatContainer.appendChild(div);
  chatContainer.scrollTop = chatContainer.scrollHeight;
}

// TTS
function speak(text) {
  if (!window.speechSynthesis) return;
  const utterance = new SpeechSynthesisUtterance(text.replace(/[#*_`]/g, ''));
  utterance.lang = langSelect.value || 'de-DE';
  const selectedVoice = voiceSelect.value;
  if (selectedVoice) {
    const voice = speechSynthesis.getVoices().find(v => v.name === selectedVoice);
    if (voice) utterance.voice = voice;
  }
  utterance.rate = 0.9;
  speechSynthesis.speak(utterance);
}

// Initial load
if (API_KEY) saveSettings();
</script>
</body>
</html>
